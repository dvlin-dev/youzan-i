<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>云链 · 进销存 Demo（服装批发）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F1ECE2; --surface:#FCFBF6; --surface-2:#EDE7DA;
    --border:#E2DBCC; --border-strong:#CFC6B2;
    --ink:#201B13; --text:#2C2619; --text-2:#6B6453; --text-3:#9C9379;
    --primary:#0E5E57; --primary-600:#127068; --primary-weak:#DBECE7; --primary-ring:rgba(18,112,104,.32);
    --success:#2F7D46; --success-weak:#E3EFDF;
    --warn:#A86E14; --warn-weak:#F5E9CD;
    --danger:#B23F2C; --danger-2:#BC3A2A; --danger-weak:#F6E1D7;
    --teal:#0F6E66; --teal-weak:#DEEDE9;
    --shadow-sm:0 1px 2px rgba(40,32,18,.05), 0 1px 1px rgba(40,32,18,.04);
    --shadow-md:0 4px 16px -4px rgba(40,32,18,.13), 0 2px 6px -2px rgba(40,32,18,.08);
    --shadow-lg:0 24px 60px -12px rgba(33,27,19,.30), 0 8px 20px -8px rgba(33,27,19,.18);
    --r-sm:7px; --r:10px; --r-lg:14px; --r-xl:20px;
    --sb:248px;
    --font:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    --display:'Bricolage Grotesque','Hanken Grotesk','PingFang SC',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font); color:var(--text);
    background-color:var(--bg);
    background-image:radial-gradient(rgba(120,96,52,.05) 1px,transparent 1.4px);
    background-size:24px 24px;
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .display,.page-title,.kpi .val,.stat-strip .ss .v,.brand .name,.sg-stat .s .n{font-family:var(--display);letter-spacing:-.02em}
  .tnum{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::selection{background:var(--primary-weak);color:var(--primary)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#D2C9B5;border-radius:8px;border:3px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#C0B69E}

  .app{display:grid;grid-template-columns:var(--sb) 1fr;height:100vh}
  .sidebar{background:var(--ink);color:#E8E2D4;display:flex;flex-direction:column;padding:18px 14px;gap:6px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
  .brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#15857A,#0B5048);display:grid;place-items:center;box-shadow:0 4px 12px rgba(11,80,72,.42)}
  .brand .logo svg{width:18px;height:18px;color:#fff}
  .brand .name{font-weight:700;font-size:15.5px;letter-spacing:-.01em;color:#fff}
  .brand .sub{font-size:11px;color:#9A917C;margin-top:1px}
  .nav-label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#857C68;padding:14px 10px 6px;font-weight:600}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:#B7AE98;font-weight:500;font-size:13.5px;transition:background .15s,color .15s;width:100%;text-align:left;position:relative}
  .nav-item svg{width:18px;height:18px;flex:none;opacity:.9}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#F2EDE0}
  .nav-item.active{background:rgba(20,120,110,.20);color:#fff}
  .nav-item.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:#2FB3A4}
  .nav-item .badge-n{margin-left:auto;background:rgba(255,255,255,.12);color:#fff;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:600}
  .nav-item.warnpill .badge-n{background:rgba(245,180,60,.28);color:#F6C461}
  .sb-spacer{flex:1}
  .userbox{border-top:1px solid rgba(255,255,255,.08);padding-top:12px;margin-top:6px}
  .role-switch{font-size:11px;color:#857C68;padding:0 4px 8px;font-weight:600;letter-spacing:.04em}
  .roles{display:flex;gap:5px;background:rgba(0,0,0,.22);padding:4px;border-radius:10px}
  .role-btn{flex:1;padding:7px 4px;border-radius:7px;font-size:12px;font-weight:600;color:#9C937E;transition:all .15s}
  .role-btn:hover{color:#E8E2D4}
  .role-btn.active{background:#39322568;background:#3A3326;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .me{display:flex;align-items:center;gap:10px;padding:10px 6px 2px}
  .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#15857A,#0B5048);display:grid;place-items:center;color:#fff;font-weight:600;font-size:13px;flex:none}
  .me .info{line-height:1.3;min-width:0}
  .me .info b{font-size:13px;color:#fff;font-weight:600}
  .me .info span{font-size:11px;color:#857C68;display:block}

  .main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
  .topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 26px;background:rgba(241,236,226,.85);backdrop-filter:blur(8px);flex:none;z-index:5}
  .page-title{font-size:18px;font-weight:700;letter-spacing:-.015em;color:var(--ink)}
  .topbar-spacer{flex:1}
  .cmdk{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 11px;color:var(--text-3);font-size:13px;min-width:210px;transition:border-color .15s}
  .cmdk:hover{border-color:var(--border-strong)}
  .cmdk svg{width:15px;height:15px}
  .cmdk .kbd{margin-left:auto;display:flex;gap:3px}
  .kbd kbd,.cmdk .kbd kbd{font-family:var(--font);font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-bottom-width:2px;border-radius:5px;padding:1px 5px;color:var(--text-2);font-weight:600}
  .icon-btn{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;color:var(--text-2);border:1px solid transparent;transition:all .15s;position:relative}
  .icon-btn:hover{background:var(--surface);border-color:var(--border);color:var(--ink)}
  .icon-btn svg{width:19px;height:19px}
  .ai-btn{display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;transition:transform .12s,box-shadow .15s;box-shadow:var(--shadow-sm)}
  .ai-btn:hover{box-shadow:0 6px 18px -4px rgba(11,80,72,.5)}
  .ai-btn:active{transform:translateY(1px)}
  .ai-btn svg{width:16px;height:16px;color:#5ED2C2}

  .content{flex:1;overflow-y:auto;padding:24px 26px 64px}
  .content-inner{max-width:1180px;margin:0 auto}

  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .muted{color:var(--text-2)} .dim{color:var(--text-3)}
  h2.sec{font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--text-2);text-transform:uppercase;margin:6px 0 12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
  .pad{padding:18px}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .14s}
  .btn svg{width:15px;height:15px}
  .btn:hover{border-color:var(--border-strong);background:var(--surface-2)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--primary-600);border-color:var(--primary-600);color:#fff;box-shadow:0 1px 2px rgba(18,112,104,.3)}
  .btn.primary:hover{background:var(--primary);box-shadow:0 4px 12px -2px rgba(18,112,104,.42)}
  .btn.ghost{border-color:transparent;background:transparent}
  .btn.ghost:hover{background:var(--surface-2)}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
  .btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--primary-ring)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:30px;font-size:11.5px;font-weight:600;line-height:1.6}
  .pill .dot{width:6px;height:6px;border-radius:50%}
  .pill.ok{background:var(--success-weak);color:var(--success)} .pill.ok .dot{background:var(--success)}
  .pill.warn{background:var(--warn-weak);color:var(--warn)} .pill.warn .dot{background:var(--warn)}
  .pill.danger{background:var(--danger-weak);color:var(--danger-2)} .pill.danger .dot{background:var(--danger-2)}
  .pill.neutral{background:var(--surface-2);color:var(--text-2)} .pill.neutral .dot{background:var(--text-3)}
  .pill.info{background:var(--primary-weak);color:var(--primary)} .pill.info .dot{background:var(--primary-600)}
  .pill.teal{background:var(--teal-weak);color:var(--teal)} .pill.teal .dot{background:var(--teal)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 17px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s}
  .kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .kpi .top{display:flex;align-items:center;justify-content:space-between}
  .kpi .lbl{font-size:12.5px;color:var(--text-2);font-weight:500}
  .kpi .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center}
  .kpi .ic svg{width:16px;height:16px}
  .kpi .val{font-size:29px;font-weight:700;margin-top:12px;color:var(--ink)}
  .kpi .val small{font-size:14px;font-weight:600;color:var(--text-3)}
  .kpi .delta{font-size:12px;margin-top:5px;font-weight:500}
  .kpi .delta.up{color:var(--success)} .kpi .delta.down{color:var(--danger-2)}

  .tbl{width:100%;border-collapse:collapse}
  .tbl th{font-size:11.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--text-3);font-weight:600;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
  .tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tbody tr{transition:background .12s}
  .tbl tbody tr:hover{background:var(--surface-2)}
  .tbl .num{text-align:right}
  .tbl .clickable{cursor:pointer}
  .tbl .clickable:hover{background:var(--primary-weak)}

  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px 12px;min-width:240px;transition:all .15s}
  .search:focus-within{border-color:var(--primary-600);box-shadow:0 0 0 3px var(--primary-ring)}
  .search svg{width:15px;height:15px;color:var(--text-3)}
  .search input{border:none;outline:none;background:none;font-size:13.5px;width:100%;color:var(--text)}
  .seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px}
  .seg button{padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--text-2)}
  .seg button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);font-weight:500;user-select:none;cursor:pointer}
  .switch{width:38px;height:22px;border-radius:20px;background:var(--border-strong);position:relative;transition:background .18s;flex:none}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .18s}
  .switch.on{background:var(--primary-600)} .switch.on::after{transform:translateX(16px)}

  .style-group{border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .sg-head{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;transition:background .12s}
  .sg-head:hover{background:var(--surface-2)}
  .sg-chev{transition:transform .2s;color:var(--text-3)}
  .sg-chev.open{transform:rotate(90deg)}
  .sg-thumb{width:38px;height:38px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff}
  .sg-title{font-weight:600;font-size:14px;color:var(--ink)}
  .sg-meta{font-size:12px;color:var(--text-3);margin-top:1px}
  .sg-stat{margin-left:auto;display:flex;gap:22px;align-items:center}
  .sg-stat .s{text-align:right}
  .sg-stat .s .n{font-weight:700;font-size:16px}
  .sg-stat .s .k{font-size:11px;color:var(--text-3)}
  .matrix-wrap{padding:4px 16px 18px;overflow-x:auto;border-top:1px solid var(--border);background:var(--surface-2)}
  .matrix{border-collapse:separate;border-spacing:6px;margin-top:8px}
  .matrix th{font-size:11.5px;color:var(--text-2);font-weight:600;padding:4px 8px;text-align:center}
  .matrix th.cr{text-align:right;padding-right:12px;min-width:64px}
  .cell{width:62px;height:46px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .12s}
  .cell:hover{border-color:var(--primary-600);box-shadow:0 0 0 3px var(--primary-ring);transform:translateY(-1px)}
  .cell .q{font-weight:700;font-size:15px}
  .cell .z{font-size:10px;color:var(--text-3)}
  .cell.lvl-ok .q{color:var(--ink)}
  .cell.lvl-warn{background:var(--warn-weak);border-color:#E7D2A0} .cell.lvl-warn .q{color:var(--warn)}
  .cell.lvl-danger{background:var(--danger-weak);border-color:#EBC4B2} .cell.lvl-danger .q{color:var(--danger-2)}
  .cell.empty{opacity:.4;cursor:default;background:transparent;border-style:dashed}
  .cell.empty:hover{transform:none;box-shadow:none;border-color:var(--border)}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-2);margin-bottom:6px}
  .field .hint{font-size:11.5px;color:var(--text-3);font-weight:400;margin-left:6px}
  .input,select.input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;font-size:13.5px;font-family:inherit;color:var(--text);background:var(--surface);transition:all .15s}
  .input:focus{outline:none;border-color:var(--primary-600);box-shadow:0 0 0 3px var(--primary-ring)}
  .qty-in{width:58px;text-align:center;padding:6px;border:1px solid var(--border);border-radius:7px;font-size:14px;font-weight:600;font-family:var(--font);background:var(--surface);color:var(--text)}
  .qty-in:focus{outline:none;border-color:var(--primary-600);box-shadow:0 0 0 3px var(--primary-ring)}
  .field-err{color:var(--danger-2);font-size:12px;margin-top:8px;font-weight:500;background:var(--danger-weak);padding:8px 10px;border-radius:8px}

  .scrim{position:fixed;inset:0;background:rgba(33,27,19,.42);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;background:var(--surface);box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);z-index:50;display:flex;flex-direction:column}
  .drawer.show{transform:none}
  .drawer-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .drawer-body{flex:1;overflow-y:auto;padding:18px 20px}

  .copilot{width:436px}
  .cop-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
  .cop-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#15857A,#0B5048);display:grid;place-items:center;flex:none}
  .cop-logo svg{width:18px;height:18px;color:#fff}
  .cop-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;background:var(--surface-2)}
  .msg{max-width:90%;font-size:13.5px;line-height:1.55}
  .msg.user{align-self:flex-end;background:var(--primary-600);color:#fff;padding:9px 13px;border-radius:14px 14px 4px 14px;box-shadow:var(--shadow-sm)}
  .msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);padding:11px 14px;border-radius:14px 14px 14px 4px;box-shadow:var(--shadow-sm);color:var(--text)}
  .msg.ai b{color:var(--ink)}
  .toolcard{margin-top:10px;border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--surface)}
  .toolcard .tc-h{background:var(--ink);color:#fff;padding:8px 12px;font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:7px;letter-spacing:.02em}
  .toolcard .tc-h svg{width:13px;height:13px;color:#5ED2C2}
  .toolcard pre{font-family:var(--mono);font-size:11.5px;line-height:1.6;padding:11px 12px;color:#46402F;overflow-x:auto;white-space:pre-wrap;word-break:break-word}
  .toolcard .tc-k{color:var(--primary)} .toolcard .tc-s{color:var(--teal)} .toolcard .tc-n{color:var(--danger)}
  .hitl{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--warn);background:var(--warn-weak);padding:7px 11px;border-top:1px solid #E7D2A0}
  .hitl svg{width:13px;height:13px;flex:none}
  .tc-actions{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border)}
  .cop-foot{padding:12px 14px;border-top:1px solid var(--border);background:var(--surface)}
  .cop-input{display:flex;gap:8px;align-items:flex-end}
  .cop-input textarea{flex:1;border:1px solid var(--border);border-radius:11px;padding:10px 12px;font-family:inherit;font-size:13.5px;resize:none;max-height:90px;line-height:1.4;color:var(--text);background:var(--surface)}
  .cop-input textarea:focus{outline:none;border-color:var(--primary-600);box-shadow:0 0 0 3px var(--primary-ring)}
  .cop-send{width:38px;height:38px;border-radius:10px;background:var(--primary-600);color:#fff;display:grid;place-items:center;flex:none;transition:all .14s}
  .cop-send:hover{background:var(--primary)} .cop-send svg{width:17px;height:17px}
  .suggest{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
  .chip{font-size:12px;padding:6px 11px;border-radius:30px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);transition:all .14s;font-weight:500;text-align:left}
  .chip:hover{border-color:var(--primary-600);color:var(--primary);background:var(--primary-weak)}

  .palette{position:fixed;left:50%;top:14vh;transform:translateX(-50%) scale(.98);width:560px;max-width:92vw;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);z-index:60;opacity:0;pointer-events:none;transition:opacity .16s,transform .16s;overflow:hidden}
  .palette.show{opacity:1;pointer-events:auto;transform:translateX(-50%) scale(1)}
  .pal-input{display:flex;align-items:center;gap:11px;padding:16px 18px;border-bottom:1px solid var(--border)}
  .pal-input svg{width:18px;height:18px;color:var(--text-3)}
  .pal-input input{flex:1;border:none;outline:none;font-size:16px;background:none;font-family:inherit;color:var(--text)}
  .pal-list{max-height:340px;overflow-y:auto;padding:8px}
  .pal-group{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);padding:10px 12px 5px;font-weight:600}
  .pal-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13.5px}
  .pal-item .pi-ic{width:30px;height:30px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;color:var(--text-2);flex:none}
  .pal-item .pi-ic svg{width:16px;height:16px}
  .pal-item .pi-sub{font-size:11.5px;color:var(--text-3)}
  .pal-item.sel{background:var(--primary-weak)}
  .pal-item.sel .pi-ic{background:var(--primary-600);color:#fff}

let pdStyle=STYLES[0].no,pdVals={};
function pdRows(){return Object.keys(STOCKTAKE.counts).map(key=>{
  if(STOCKTAKE.resolved[key])return null;const sku=skuByKey[key];if(!sku)return null;
  const book=STOCKTAKE.snapshot[key],actual=STOCKTAKE.counts[key],diff=actual-book;if(diff===0)return null;
  return {key,sku,book,actual,diff,val:diff*sku.cost,attr:attribute(key)};
}).filter(Boolean).sort((a,b)=>a.val-b.val);}
function pdAllRows(){return Object.keys(STOCKTAKE.counts).map(key=>{
  const sku=skuByKey[key];if(!sku)return null;const book=STOCKTAKE.snapshot[key],actual=STOCKTAKE.counts[key],diff=actual-book;if(diff===0)return null;
  return {key,sku,book,actual,diff,val:diff*sku.cost,attr:attribute(key)};
}).filter(Boolean);}
function pdLoss(){return pdAllRows().filter(r=>r.val<0).reduce((a,r)=>a+r.val,0);}
function pdRealLoss(){return pdAllRows().filter(r=>r.attr.real).reduce((a,r)=>a+r.val,0);}
function pdRecover(){return pdAllRows().filter(r=>r.attr.recover).reduce((a,r)=>a+r.val,0);}
function pdBuckets(){const o={};pdAllRows().forEach(r=>{const b=r.attr.bucket;(o[b]=o[b]||{n:0,val:0}).n++;o[b].val+=r.val;});return o;}

// 第1层确定性检测器 + 第2层归因/解释（原型里用规则模拟 LLM 的排序与措辞）
function attribute(key){
  const sku=skuByKey[key];const book=STOCKTAKE.snapshot[key],actual=STOCKTAKE.counts[key],diff=actual-book;
  const ls=ledgerOf(key).filter(l=>l.status==='posted');
  // 时间侧：快照时点之后才入账的流水（假差异）
  const late=ls.find(l=>l.ts>PD_SNAP_TS);
  if(late&&diff>0&&Math.abs(late.delta-diff)<=2){
    return {bucket:'transit',badge:'在途·假差异',conf:'高',color:'teal',real:false,recover:false,fixLabel:'纳入盘点·归零',
      reason:`盘点账面快照时点 <b>${PD_SNAP_TS}</b> 之后，有一笔到货 <b>${late.doc}</b>（${late.ts}，+${late.delta}）才入账——货已在架、也被盘到，只是流水晚于快照。<b>这不是真差异。</b>`,
      ev:[`快照时点 ${PD_SNAP_TS}`,`晚到流水 ${late.doc} @ ${late.ts}（+${late.delta}）`],
      sug:`把该到货单纳入本次盘点（或前移快照时点）即可归零，<b>无需记盘亏</b>。`};
  }
  // 串色：同款号、等量反向差异
  const sib=Object.keys(STOCKTAKE.counts).map(k=>({k,d:STOCKTAKE.counts[k]-STOCKTAKE.snapshot[k]})).find(o=>o.k!==key&&skuByKey[o.k]&&skuByKey[o.k].styleNo===sku.styleNo&&o.d===-diff&&diff!==0);
  if(sib){const other=skuByKey[sib.k];const self={s:sku,d:diff},oth={s:other,d:sib.d};
    const over=diff<0?self:oth,under=diff<0?oth:self,n=Math.abs(diff);
    return {bucket:'swap',badge:'串色·可互换',conf:'高',color:'info',real:false,recover:false,pair:sib.k,fixLabel:'一键互换·归零',
      reason:`同款号 <b>${sku.styleNo}</b> 下，<b>${over.s.color}/${over.s.size}</b> 账多 ${n}、<b>${under.s.color}/${under.s.size}</b> 账少 ${n}——等量反向，判定为<b>入库串色</b>：把 ${n} 件 <b>${under.s.color}</b> 错记成了 <b>${over.s.color}</b>。`,
      ev:[`${over.s.color}/${over.s.size} 差异 ${over.d}`,`${under.s.color}/${under.s.size} 差异 +${under.d}`,`同款号、量级相等且反向 → 串色特征`],
      sug:`一键互换：${over.s.color} 红冲 ${n}、补记到 ${under.s.color}。<b>货在仓库、净值为 0，不是损失。</b>`};
  }
  // 重复入库：同到货单号两笔
  const ins=ls.filter(l=>l.delta>0&&l.bizType==='采购到货');
  const dupDoc=ins.map(l=>l.doc).find((d,i,a)=>a.indexOf(d)!==i);
  if(diff<0&&dupDoc){const dups=ins.filter(l=>l.doc===dupDoc);
    return {bucket:'dup',badge:'重复入库',conf:'高',color:'warn',real:false,recover:false,fixLabel:'红冲重复笔',
      reason:`到货单 <b>${dupDoc}</b> 在流水里出现 <b>两笔</b>相同入库（各 +${dups[0].delta}，${dups.map(d=>d.ts.slice(5,16)).join(' / ')}）——典型<b>重复录入</b>，账面被虚增，实物从来没这么多。`,
      ev:dups.map(d=>`${d.doc}　+${d.delta}　@ ${d.ts}`),
      sug:`红冲其中一笔（−${dups[0].delta}）即可。<b>这是账面虚高的修正，不是真实损失。</b>`};
  }
  // 供应商少发：收货 == 应收且未质检
  const noqc=ls.find(l=>l.delta>0&&l.qc===false&&l.poRef);
  if(diff<0&&noqc){const po=POS.find(p=>p.no===noqc.poRef);const line=po&&po.lines.find(x=>x.sku===key);
    if(line&&line.ordered===noqc.delta){
      return {bucket:'supplier',badge:'供应商少发·可索赔',conf:'中高',color:'warn',real:false,recover:true,fixLabel:'记盘亏·标记索赔',
        reason:`收货单 <b>${noqc.doc}</b> 按采购单 <b>${noqc.poRef}</b> 应收 ${line.ordered} 件<b>照单全收</b>（+${noqc.delta}），却<b>未点数 / 未质检</b>。实盘短少 ${Math.abs(diff)} 件，高度怀疑<b>供应商少发、收货没核实</b>。`,
        ev:[`收货 ${noqc.doc}　+${noqc.delta}`,`采购单 ${noqc.poRef} 应收 ${line.ordered}（收 = 应收）`,`收货标记：未质检 / 未点数`],
        sug:`记盘亏并<b>向供应商索赔 / 补发</b>；并把该供应商收货改为<b>强制点数</b>。<b>金额大概率可追回。</b>`};
    }
  }
  // 疑错发：近期大额销售出库（仅对编排款给假设，避免误伤）
  if(diff<0&&sku.styleNo==='AW2024-4408'){const big=ls.find(l=>l.delta<0&&l.bizType==='销售出库'&&Math.abs(l.delta)>=Math.abs(diff)*0.7);
    if(big)return {bucket:'misship',badge:'疑错发·待核实',conf:'中',color:'warn',real:false,recover:true,fixLabel:'记盘亏·待核实',
      reason:`近期有一笔较大销售出库 <b>${big.doc}</b>（${big.ts}，${big.delta}）。实盘短少 ${Math.abs(diff)} 件，<b>疑似该单实发多于开单</b>（错发 / 多发）。`,
      ev:[`近期大额出库 ${big.doc}　${big.delta}　@ ${big.ts}`,`无其它系统解释`],
      sug:`核对该出库单实发数与客户签收；若确为多发，<b>向客户追回或补开单</b>。先记盘亏待核实。`};
  }
  // 兜底：实物损耗（查无解释）——诚实，不编原因
  const highVal=sku.cost>=15000,fragile=/真丝|缎面/.test(sku.styleName);
  const flavor=highVal?'疑失窃':(fragile?'报损/退货残次':'查无解释');
  return {bucket:'loss',badge:'实物损耗·'+flavor,conf:highVal?'中':'低',color:'danger',real:true,recover:false,fixLabel:'记盘亏·实物损耗',
    reason:`该 SKU 流水<b>完全自洽</b>（库存 = 流水累加），检测器逐项排查（串色 / 重复 / 供应商 / 在途）<b>均未命中</b>——系统侧给不出解释，差异落在<b>实物侧</b>。${highVal?'且为<b>高价值小件</b>，失窃风险偏高。':''}`,
    ev:['流水自洽、无异常录入','无配对串色、无重复单、无照单全收','非快照时点错位'],
    sug:`系统不编原因。建议：${highVal?'调取 5/10–5/30 该货位监控、':''}安排该货位复盘（排除错放邻格），先记盘亏待老板复核。<b>这部分是真实净损失。</b>`};
}

function pdBizType(key){const b=attribute(key).bucket;return {swap:'盘点调整·串色互换',dup:'盘点红冲·重复入库',supplier:'盘点盘亏·供应商少发(待索赔)',misship:'盘点盘亏·疑错发(待核实)',transit:'盘点盘盈·在途补录',loss:'盘点盘亏·实物损耗(待核查)'}[b]||'盘点调整';}

function parseIntent(text){
  const t=text.trim();
  if(/(断货|断码|缺货|快没|低库存|要补|补货|滞销)/.test(t)){
    if(/补货|采购建议|建议/.test(t))return {kind:'replenish'};
    return {kind:'lowstock'};
  }
  if(/(对账|盘点|差异|差在哪|对一下账|账实|差多少|差了)/.test(t))return {kind:'recon'};
  const isOut=/(出库|出货|出\s*\d|发货|卖)/.test(t);
  const isIn=/(入库|入仓|进货|补\s*\d|到货|加\s*\d)/.test(t);
  if(isOut||isIn){
    let qty=null;const m1=t.match(/(\d{1,4})\s*(?:件|个|pcs|双|条|手)/);
    if(m1){qty=parseInt(m1[1]);}
    else{const cc=t.replace(/AW2024-\d{4}/ig,' ').replace(/\d?XL/ig,' ').replace(/\b\d{5,}\b/g,' ');const m2=cc.match(/(?:出库|入库|出|入|补|加|要|发|进|来)\s*(\d{1,4})/);if(m2)qty=parseInt(m2[1]);else{const m3=cc.match(/(\d{1,4})/);if(m3)qty=parseInt(m3[1]);}}
    let style=null;const sm=t.match(/AW2024-\d{4}/i);
    if(sm)style=STYLES.find(s=>s.no.toLowerCase()===sm[0].toLowerCase());
    if(!style)style=STYLES.find(s=>t.includes(s.name));
    if(!style)style=STYLES.find(s=>s.cat&&t.includes(s.cat.slice(0,2)));
    let color=null,size=null;
    if(style){color=style.colors.find(c=>t.includes(c));size=style.sizes.find(z=>new RegExp('(^|[^A-Za-z0-9])'+z+'([^A-Za-z0-9]|码|$)','i').test(t));}
    return {kind:isOut?'OUT':'IN',style,color,size,qty};
  }
  return {kind:'unknown'};
}

  if(S.role!=='buyer')items.push({g:'指令',ic:I.in,t:'录入入库 / 出库',sub:'矩阵批量录入',act:()=>go('move')});
  if(can.recon())items.push({g:'指令',ic:I.scale,t:'打开盘点对账',sub:'5 类成因 · AI 差异归因',act:()=>go('recon')});
  SKUS.forEach(s=>{if(q&&((s.styleName+s.styleNo+s.color+s.size).toLowerCase().includes(q)||s.barcode.includes(q)))items.push({g:'SKU',ic:I.box,t:`${s.styleName} · ${s.color}/${s.size}`,sub:`${s.key} · 库存 ${stockOf(s.key)}`,act:()=>{closeOverlays();openDrawer(ledgerDrawer(s.key));}});});
  let list=q?items.filter(i=>(i.t+i.sub+i.g).toLowerCase().includes(q)).slice(0,9):items.filter(i=>i.g!=='SKU');
  palItems=list;
  const groups={};list.forEach((i,idx)=>{(groups[i.g]=groups[i.g]||[]).push({i,idx});});
  $('#palList').innerHTML=Object.entries(groups).map(([g,arr])=>`<div class="pal-group">${g}</div>`+arr.map(({i,idx})=>`<div class="pal-item ${idx===palSel?'sel':''}" data-pal="${idx}"><div class="pi-ic">${svg(i.ic,16)}</div><div><div>${i.t}</div>${i.sub?`<div class="pi-sub">${i.sub}</div>`:''}</div></div>`).join('')).join('')||`<div class="empty" style="padding:30px"><div class="dim">没有匹配项</div></div>`;
}
function palMove(d){palSel=Math.max(0,Math.min(palItems.length-1,palSel+d));document.querySelectorAll('.pal-item').forEach(n=>n.classList.toggle('sel',+n.dataset.pal===palSel));const sel=document.querySelector('.pal-item.sel');if(sel)sel.scrollIntoView({block:'nearest'});}
function palEnter(){const it=palItems[palSel];if(it){closeOverlays();it.act();}}

function toast(type,msg,undo){
  const t=el(`<div class="toast ${type}"><span class="t-ic">${svg(type==='ok'?I.check:type==='warn'?I.alert:I.x,14)}</span><span>${msg}</span>${undo?'<button class="t-undo">撤销</button>':''}</div>`);
  $('#toasts').appendChild(t);
  if(undo)t.querySelector('.t-undo').onclick=()=>{undo();t.remove();};
  setTimeout(()=>{t.style.transition='opacity .3s,transform .3s';t.style.opacity=0;t.style.transform='translateY(8px)';setTimeout(()=>t.remove(),320);},undo?5200:3000);
}

function go(page){if(!NAV[S.role].includes(page))page='dash';S.page=page;closeOverlays();render();}
function reviewDoc(doc){
  const ls=LEDGER.filter(l=>l.doc===doc&&l.status==='pending');if(!ls.length)return;
  const op=ls[0].operator;const reviewer=USERS[S.role].name;
  if(reviewer===op){toast('warn','需由他人复核（录入人 ≠ 复核人）：已自动指派「仓管阿强」复核');}
  ls.forEach(l=>{l.status='posted';l.reviewer=(reviewer===op?'仓管阿强':reviewer);});
  toast('ok',`${doc} 已复核入账`,()=>{ls.forEach(l=>l.status='pending');render();});
  render();
}
function rejectDoc(doc){LEDGER=LEDGER.filter(l=>!(l.doc===doc&&l.status==='pending'));toast('warn',doc+' 已驳回');render();}
function submitMove(){
  const entries=Object.entries(moveQty).map(([k,v])=>[k,parseInt(v)||0]).filter(([k,v])=>v>0);
  const errBox=$('#moveErr');errBox.innerHTML='';
  if(!entries.length){errBox.innerHTML='<div class="field-err">请至少录入一个数量</div>';return;}
  if(moveType==='OUT'){const bad=entries.filter(([k,v])=>v>stockOf(k));if(bad.length){errBox.innerHTML=`<div class="field-err">${svg(I.alert,13)} ${bad.length} 个 SKU 出库数超过当前库存，会导致负库存（已拦截）。例如 ${bad[0][0]} 现 ${stockOf(bad[0][0])}、欲出 ${bad[0][1]}。</div>`;return;}}
  const doc=(moveType==='IN'?'IN':'OUT')+'-'+TODAY.replace(/-/g,'')+'-'+String(DOCSEQ[moveType]++).padStart(3,'0');
  entries.forEach(([k,v])=>LEDGER.push({id:'L'+(LID++),sku:k,type:moveType,delta:moveType==='IN'?v:-v,bizType:moveType==='IN'?'采购到货':'销售出库',doc,ts:TODAY+' '+nowhm(),operator:USERS[S.role].name,reviewer:null,status:'pending'}));
  const sum=entries.reduce((a,[k,v])=>a+v,0);moveQty={};
  toast('ok',`已提交 ${doc} · ${sum}件（待复核）`,()=>{LEDGER=LEDGER.filter(l=>l.doc!==doc);render();});
  render();
}
function receivePO(no){
  const p=POS.find(x=>x.no===no);if(!p)return;
  const doc='IN-'+TODAY.replace(/-/g,'')+'-PO'+String(DOCSEQ.IN++).padStart(2,'0');
  p.lines.forEach(l=>{const remain=l.ordered-l.received;if(remain>0){LEDGER.push({id:'L'+(LID++),sku:l.sku,type:'IN',delta:remain,bizType:'采购到货',doc,ts:TODAY+' '+nowhm(),operator:USERS[S.role].name,reviewer:null,status:'pending'});l.received=l.ordered;}});
  p.status='已入库';
  closeOverlays();toast('ok',`${no} 登记到货，生成 ${doc}（待复核）`);render();
}

document.addEventListener('click',e=>{
  const t=e.target.closest('[data-nav],[data-role],[data-act],[data-style],[data-sku],[data-recon],[data-adopt],[data-po],[data-mt],[data-review],[data-reject],[data-suggest],[data-confirm],[data-cancel],[data-pal]');
  if(!t)return;
  if(t.dataset.nav){go(t.dataset.nav);return;}
  if(t.dataset.role){S.role=t.dataset.role;if(!NAV[S.role].includes(S.page))S.page='dash';closeOverlays();render();toast('ok','已切换为「'+USERS[S.role].label+'」视角');return;}
  if(t.dataset.style!==undefined){S.openStyles[t.dataset.style]=!S.openStyles[t.dataset.style];render();return;}
  if(t.dataset.sku){openDrawer(ledgerDrawer(t.dataset.sku));return;}
  if(t.dataset.recon){openDrawer(pdDrawer(t.dataset.recon));return;}
  if(t.dataset.adopt){pdAdoptRow(t.dataset.adopt);return;}
  if(t.dataset.po){openDrawer(poDrawer(t.dataset.po));return;}
  if(t.dataset.mt){moveType=t.dataset.mt;render();return;}
  if(t.dataset.review){reviewDoc(t.dataset.review);return;}
  if(t.dataset.reject){rejectDoc(t.dataset.reject);return;}
  if(t.dataset.suggest){runCopilot(t.dataset.suggest);return;}
  if(t.dataset.confirm){confirmAction(t.dataset.confirm);return;}
  if(t.dataset.cancel){const c=t.closest('.tc-actions');if(c)c.innerHTML='<span class="dim" style="font-size:12px;padding:2px 4px">已取消</span>';return;}
  if(t.dataset.pal!==undefined){palSel=+t.dataset.pal;palEnter();return;}
  const a=t.dataset.act;
  if(a==='close')closeOverlays();
  else if(a==='closebanner'){S.bannerShown=false;render();}
  else if(a==='lowtoggle'){S.invLowOnly=!S.invLowOnly;render();}
  else if(a==='clearfilter'){S.invQuery='';S.invLowOnly=false;render();}
  else if(a==='submitmove')submitMove();
  else if(a==='copsend'){const ta=$('#copInput');if(ta&&ta.value.trim()){runCopilot(ta.value.trim());ta.value='';ta.style.height='auto';}}
  else if(a==='gotolow'){closeOverlays();S.invLowOnly=true;go('stock');}
  else if(a==='gotorecon'){go('recon');}
  else if(a==='pdentry'){S.pdEntry=true;render();}
  else if(a==='pdback'){S.pdEntry=false;render();}
  else if(a==='pdsubmit')pdSubmitEntry();
  else if(a==='pdpostall')pdPostAll();
  else if(a==='pdreset')pdReset();
  else if(a==='receive')receivePO(t.dataset.po);
  else if(a==='newpo')toast('ok','原型演示：新建采购单流程（略）');
});
$('#scrim').addEventListener('click',closeOverlays);
$('#aiOpen').addEventListener('click',openCopilot);
$('#cmdkBtn').addEventListener('click',openPalette);
$('#bellBtn').addEventListener('click',openCopilot);
document.addEventListener('input',e=>{
  if(e.target.id==='invSearch'){S.invQuery=e.target.value;const v=$('#view');v.innerHTML=VIEWS_stock();const inp=$('#invSearch');inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
  if(e.target.dataset&&e.target.dataset.q!==undefined){moveQty[e.target.dataset.q]=e.target.value;}
  if(e.target.dataset&&e.target.dataset.pq!==undefined){pdVals[e.target.dataset.pq]=e.target.value;}
  if(e.target.id==='copInput'){e.target.style.height='auto';e.target.style.height=Math.min(90,e.target.scrollHeight)+'px';}
});
document.addEventListener('change',e=>{if(e.target.id==='moveStyleSel'){moveStyle=e.target.value;render();}if(e.target.id==='pdStyleSel'){pdStyle=e.target.value;render();}});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('#palette').classList.contains('show')?closeOverlays():openPalette();return;}
  if(e.key==='Escape')closeOverlays();
  if($('#palette').classList.contains('show')){
    if(e.key==='ArrowDown'){e.preventDefault();palMove(1);}
    if(e.key==='ArrowUp'){e.preventDefault();palMove(-1);}
    if(e.key==='Enter'){e.preventDefault();palEnter();}
  }
  if(e.target.id==='copInput'&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();const v=e.target.value.trim();if(v){runCopilot(v);e.target.value='';e.target.style.height='auto';}}
});

function bootSkeleton(){
  $('#view').innerHTML=`<div style="margin-bottom:22px"><div class="sk" style="height:18px;width:160px;margin-bottom:18px"></div><div class="kpis">${'<div class="kpi"><div class="sk" style="height:14px;width:60%"></div><div class="sk" style="height:30px;width:50%;margin-top:16px"></div></div>'.repeat(4)}</div></div><div class="card pad"><div class="sk" style="height:16px;width:120px;margin-bottom:16px"></div>${'<div class="sk" style="height:46px;margin-bottom:8px"></div>'.repeat(4)}</div>`;
  renderShell();
}
bootSkeleton();
setTimeout(render,560);
</script>
</body>
